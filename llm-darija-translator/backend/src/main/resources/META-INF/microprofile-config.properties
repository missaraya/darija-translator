# ============================================================
#  MicroProfile Config — application configuration
#  Override any property using environment variables.
#  MicroProfile maps GEMINI_API_KEY -> gemini.api.key
#  and AUTH_USERNAME -> auth.username automatically.
# ============================================================

# Application info
app.name=Darija Translator
app.version=1.0.0

# Security credentials (override in production via environment variables)
# ENV: AUTH_USERNAME, AUTH_PASSWORD
auth.username=student
auth.password=student123

# Gemini LLM provider config
# REQUIRED: set GEMINI_API_KEY environment variable before starting
gemini.api.key=your-gemini-api-key-here
gemini.model=gemini-1.5-flash
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models

# Translation limits
translation.max.text.length=5000
